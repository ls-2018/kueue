apiVersion: batch/v1
kind: Job
metadata:
  name: sample-job
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: user-queue
spec:
  parallelism: 3
  completions: 3
  suspend: true
  template:
    spec:
      containers:
        - name: dummy-job
          image: registry.cn-hangzhou.aliyuncs.com/acejilam/busybox
          command: [ "/bin/sh" ]
          args: [ "-c", "sleep 60" ]
          resources:
            requests:
              cpu: "1"
              memory: "200Mi"
      restartPolicy: Never