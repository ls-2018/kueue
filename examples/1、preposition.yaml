apiVersion: kueue.x-k8s.io/v1alpha1
kind: Cohort
metadata:
  name: "ai-for-humanity-foundation"
---
apiVersion: kueue.x-k8s.io/v1alpha1
kind: Topology
metadata:
  name: "zone-tp"
spec:
  levels:
    - nodeLabel: zone
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: "default-flavor"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: "spot"
spec:
  nodeLabels:
    instance-type: spot
  tolerations:
    - key: "spot-taint" ## The key of the node taint.
      operator: "Exists"
      effect: "NoSchedule" ## Supported effects are NoSchedule, NoExecute, and PreferNoSchedule.
  nodeTaints:
  topologyName: zone-tp
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: "cluster-queue2"
spec:
  cohort: ai-for-humanity-foundation
  namespaceSelector: { } # match all.
  preemption:
    borrowWithinCohort:
      policy: LowerPriority
    withinClusterQueue: LowerPriority
    reclaimWithinCohort: Any # Any、Never if the pending Workload fits within the nominal quota of its ClusterQueue, preempt any Workload in the cohort, irrespective of priority.
  flavorFungibility:
    whenCanBorrow: Borrow  # this is the default but I'm making it explicit here
    whenCanPreempt: Preempt  # ensures that accelerators aren't hit with compute workloads
  admissionChecksStrategy:
    admissionChecks:
      - name: "sample-prov"           # Name of the AdmissionCheck to be run
        onFlavors: [ "spot" ] # This AdmissionCheck will only run for Workloads that use default-flavor
      - name: "sample-prov-2" # This AdmissionCheck will run for all Workloads regardless of a used ResourceFlavor
  resourceGroups:
    - coveredResources: [ "cpu","memory" ]
      flavors:
        - name: "spot"
          resources:
            - name: "cpu"
              nominalQuota: 1
            - name: "memory"
              nominalQuota: 1Gi
#        - name: "default-flavor"
#          resources:
#            - name: "cpu"
#              nominalQuota: 1
#            - name: "memory"
#              nominalQuota: 1Gi

---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: "cluster-queue"
spec:
  cohort: ai-for-humanity-foundation
  namespaceSelector: { } # match all.
  preemption:
    borrowWithinCohort:
      policy: LowerPriority
    withinClusterQueue: LowerPriority
    reclaimWithinCohort: Any # Any、Never if the pending Workload fits within the nominal quota of its ClusterQueue, preempt any Workload in the cohort, irrespective of priority.
  flavorFungibility:
    whenCanBorrow: Borrow  # this is the default but I'm making it explicit here
    whenCanPreempt: Preempt  # ensures that accelerators aren't hit with compute workloads
  resourceGroups:
    - coveredResources: [ "cpu", "memory" ]
      flavors:
        - name: "spot"
          resources:
            - name: "cpu"
              nominalQuota: 6
              borrowingLimit: 3    # 超出1
              lendingLimit: 3      # 至多借出1
            - name: "memory"
              nominalQuota: 6Gi
              borrowingLimit: 3Gi    # 多使用 1
              lendingLimit: 3Gi     # 至多借出 1
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  namespace: "default"
  name: "user-queue"
spec:
  clusterQueue: "cluster-queue"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  namespace: "default"
  name: "user-queue2"
spec:
  clusterQueue: "cluster-queue2"